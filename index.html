<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEVORQX</title>
       <meta name="description" content="NEVORQX">
    <meta property="og:type" content="website">
    <meta property="og:title" content="NEVORQX">
    <meta property="og:image" content="logo.png">
    <meta property="og:description" content="NEVORQX">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* 극강의 미니멀리즘을 위한 리셋 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Noto Sans KR', sans-serif; 
            background-color: #ffffff; /* 순백색 배경 */
            color: #000000; /* 완전 검은색 텍스트 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 20px;
        }

        /* 로고 스타일링 */
        .logo img {
            max-height: 40px; /* 로고 높이 제한 */
            margin-bottom: 30px; /* 로고와 도메인 사이 간격 */
        }

        /* 도메인 이름 강조 */
        .domain-name {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -1.5px;
            margin-bottom: 15px;
        }

        /* 서브 텍스트 */
        .sub-text {
            font-size: 0.95rem;
            font-weight: 300;
            color: #555; /* 약간 짙은 회색 */
            letter-spacing: 1px;
            margin-bottom: 50px; /* 서브 텍스트와 이메일 사이 간격 */
        }

        /* 이메일 링크 스타일 */
        .contact {
            font-size: 1rem;
            border-top: 1px solid #eee; /* 아주 연한 선으로 구분 */
            padding-top: 30px;
        }

        .contact a {
            color: #000;
            text-decoration: none;
            transition: opacity 0.3s ease;
        }

        /* 호버 효과: 투명도만 살짝 조절 */
        .contact a:hover {
            opacity: 0.6;
        }

        /* 모바일 최적화 */
        @media (max-width: 600px) {
            .domain-name { font-size: 2rem; }
            .logo img { max-height: 35px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">
            <img src="http://nevorqx.top/logo.png" alt="nevorqx logo">
        </div>

        
        <div class="contact">
            <a href="mailto:hello@nevorqx.top">hello@nevorqx.top</a>
        </div>
    </div>

</body>
</html>
