<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nevorqx</title>
    <style>
        /* 기본 여백 제거 및 화면 꽉 채우기 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff; /* 깔끔한 흰색 배경 */
        }

        .logo-container {
            text-align: center;
        }

        .logo-container img {
            /* 로고 높이 30px 유지 또는 필요시 조절 */
            height: 30px; 
            display: block;
            /* 부드러운 등장 효과 (선택 사항) */
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="logo.png" alt="Nevorqx Logo">
    </div>

</body>
</html>
